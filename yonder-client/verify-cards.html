<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Yonder Card Verifier</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  h1 { margin: 20px 0 10px; font-size: 1.5rem; }
  .controls { display: flex; gap: 12px; align-items: center; margin: 10px 0 20px; flex-wrap: wrap; justify-content: center; }
  .controls button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; background: #334; color: #eee; }
  .controls button:hover { background: #445; }
  .controls button.active { background: #5a7; color: #fff; }
  .controls select, .controls input { padding: 8px; border-radius: 6px; border: 1px solid #555; background: #222; color: #eee; font-size: 1rem; }
  .card-view { display: flex; gap: 30px; align-items: flex-start; justify-content: center; flex-wrap: wrap; max-width: 900px; margin: 0 auto; }
  .card-image { flex-shrink: 0; }
  .card-image img { width: 300px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .card-data { background: #222; border-radius: 12px; padding: 24px; min-width: 320px; max-width: 400px; }
  .card-data h2 { font-size: 1.4rem; margin-bottom: 16px; }
  .field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
  .field:last-child { border-bottom: none; }
  .label { color: #999; }
  .value { font-weight: 600; }
  .biome-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-weight: 700; }
  .biome-Red { background: #c0392b; color: #fff; }
  .biome-Green { background: #27ae60; color: #fff; }
  .biome-Blue { background: #2980b9; color: #fff; }
  .biome-Yellow { background: #f1c40f; color: #222; }
  .biome-Colorless { background: #888; color: #fff; }
  .wonder-icons { display: flex; gap: 6px; }
  .wonder-icon { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; }
  .wonder-stone { background: #2980b9; color: #fff; }
  .wonder-chimera { background: #c0392b; color: #fff; }
  .wonder-thistle { background: #27ae60; color: #fff; }
  .fame-text { color: #f39c12; font-weight: 600; }
  .nav-hint { color: #666; font-size: 0.85rem; margin: 16px 0; }
  .flag-btn { padding: 8px 18px; border: 2px solid #e74c3c; border-radius: 6px; background: transparent; color: #e74c3c; cursor: pointer; font-size: 0.9rem; margin-top: 16px; }
  .flag-btn:hover { background: #e74c3c; color: #fff; }
  .flag-btn.flagged { background: #e74c3c; color: #fff; }
  .flagged-list { margin: 20px auto; max-width: 600px; background: #2a1a1a; border-radius: 12px; padding: 20px; }
  .flagged-list h3 { color: #e74c3c; margin-bottom: 10px; }
  .flagged-list ul { list-style: none; }
  .flagged-list li { padding: 6px 0; border-bottom: 1px solid #3a2a2a; display: flex; justify-content: space-between; }
  .flagged-list li button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.9rem; }
  .counter { color: #999; font-size: 0.95rem; }
</style>
</head>
<body>

<h1>Yonder Card Verifier</h1>

<div class="controls">
  <button id="btn-regions" class="active" onclick="switchDeck('regions')">Regions (1-68)</button>
  <button id="btn-expansion-regions" onclick="switchDeck('expansion_regions')">Expansion Regions</button>
  <button id="btn-sanctuaries" onclick="switchDeck('sanctuaries')">Sanctuaries (1-45)</button>
  <button id="btn-expansion-sanctuaries" onclick="switchDeck('expansion_sanctuaries')">Expansion Sanctuaries</button>
  <select id="jump-to" onchange="jumpTo(this.value)"></select>
  <span class="counter" id="counter"></span>
</div>

<div class="card-view">
  <div class="card-image">
    <img id="card-img" alt="Card image">
  </div>
  <div class="card-data" id="card-data"></div>
</div>

<p class="nav-hint">Arrow keys or click buttons to navigate. Press F to flag a card.</p>

<div class="flagged-list" id="flagged-list" style="display:none">

  if (currentDeck === 'regions') return regions;
  if (currentDeck === 'expansion_regions') return expansion_regions;
  if (currentDeck === 'sanctuaries') return sanctuaries;
  if (currentDeck === 'expansion_sanctuaries') return expansion_sanctuaries;
}

function isRegionDeck() {
  return currentDeck === 'regions' || currentDeck === 'expansion_regions';
}

function cardId(card) {
  return isRegionDeck() ? `region-${card.number}` : `sanctuary-${card.tile}`;
}

function cardLabel(card) {
  return isRegionDeck() ? `Region #${card.number}` : `Sanctuary #${card.tile}`;
}

function imagePath(card) {
  if (isRegionDeck()) {
    return `region/tile${String(card.number).padStart(3, '0')}.jpg`;
  } else {
    return `sanctuary/tile${String(card.tile).padStart(3, '0')}.jpg`;
  }
}

function wondersHtml(w) {
  const [s, c, t] = w;
  if (s === 0 && c === 0 && t === 0) return '<span style="color:#666">None</span>';
  let html = '<div class="wonder-icons">';
  if (s > 0) html += `<span class="wonder-icon wonder-stone">${s} Stone</span>`;
  if (c > 0) html += `<span class="wonder-icon wonder-chimera">${c} Chimera</span>`;
  if (t > 0) html += `<span class="wonder-icon wonder-thistle">${t} Thistle</span>`;
  html += '</div>';
  return html;
}

  const card = deck[currentIndex];
  const id = cardId(card);

  const img = document.getElementById('card-img');
  img.src = imagePath(card);
  img.alt = cardLabel(card);
  document.getElementById('counter').textContent = `${currentIndex + 1} / ${deck.length}`;

  let html = `<h2>${cardLabel(card)}</h2>`;
  html += `<div class="field"><span class="label">Biome</span><span class="value"><span class="biome-badge biome-${card.biome}">${card.biome}</span></span></div>`;
  html += `<div class="field"><span class="label">Night</span><span class="value">${card.night ? 'Yes' : 'No'}</span></div>`;
  html += `<div class="field"><span class="label">Clue</span><span class="value">${card.clue ? 'Yes' : 'No'}</span></div>`;
  html += `<div class="field"><span class="label">Wonders</span><span class="value">${wondersHtml(card.wonders)}</span></div>`;
  if (card.quest) {
    html += `<div class="field"><span class="label">Quest</span><span class="value">${wondersHtml(card.quest)}</span></div>`;
  }
  html += `<div class="field"><span class="label">Fame</span><span class="value fame-text">${card.fame}</span></div>`;

  html += `<button class="flag-btn ${flagged[id] ? 'flagged' : ''}" onclick="toggleFlag()">${flagged[id] ? 'Flagged — click to unflag' : 'Flag as incorrect'}</button>`;

  document.getElementById('card-data').innerHTML = html;

  // Update dropdown
  const select = document.getElementById('jump-to');
  select.innerHTML = '';
  deck.forEach((c, i) => {
    const opt = document.createElement('option');
    const cid = isRegionDeck() ? `region-${c.number}` : `sanctuary-${c.tile}`;
    const label = isRegionDeck() ? `#${c.number}` : `#${c.tile}`;
    opt.value = i;
    opt.textContent = `${label}${flagged[cid] ? ' !!!' : ''}`;
    if (i === currentIndex) opt.selected = true;
    select.appendChild(opt);
  });

  // Update button active states
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + currentDeck.replace('_', '-')).classList.add('active');

  renderFlagged();
}

function switchDeck(deck) {
  currentDeck = deck;
  currentIndex = 0;
  render();
}

function jumpTo(idx) {
  currentIndex = parseInt(idx);
  render();
}

function toggleFlag() {
  const deck = getDeck();
  const card = deck[currentIndex];
  const id = cardId(card);
  if (flagged[id]) {
    delete flagged[id];
  } else {
    flagged[id] = cardLabel(card);
  }
  localStorage.setItem('yonder-flagged', JSON.stringify(flagged));
  render();
}

function renderFlagged() {
  const keys = Object.keys(flagged);
  const list = document.getElementById('flagged-list');
  const ul = document.getElementById('flagged-ul');
  if (keys.length === 0) {
    list.style.display = 'none';
    return;
  }
  list.style.display = 'block';
  ul.innerHTML = '';
  keys.forEach(k => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${flagged[k]}</span><button onclick="unflag('${k}')">remove</button>`;
    ul.appendChild(li);
  });
}

function unflag(id) {
  delete flagged[id];
  localStorage.setItem('yonder-flagged', JSON.stringify(flagged));
  render();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const deck = getDeck();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (currentIndex < deck.length - 1) { currentIndex++; render(); }
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (currentIndex > 0) { currentIndex--; render(); }
  } else if (e.key === 'f' || e.key === 'F') {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
      toggleFlag();
    }
  }
});

render();
</script>
</body>
</html>
