<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yonder</title>
  <link rel="icon" type="image/png" href="region/card-back.png">
  <link rel="stylesheet" href="style.css?v=0">
</head>
<body>

  <!-- Lobby -->
  <div id="lobby">
    <h1>Yonder</h1>
    <div class="lobby-form">
      <label for="player-name">Your name</label>
      <input type="text" id="player-name" placeholder="Alice" maxlength="20">

      <label for="room-name">Room</label>
      <input type="text" id="room-name" placeholder="room1" maxlength="30">

      <button id="connect-btn">Join Game</button>
      <div id="lobby-status"></div>
    </div>
  </div>

  <!-- Game board (hidden until connected) -->
  <div id="game-board" class="hidden">

    <!-- Waiting room (shown before game starts) -->
    <div id="waiting-room" class="hidden">
      <h1>Yonder</h1>
      <div id="waiting-room-name"></div>
      <div id="waiting-players"></div>
      <div id="waiting-controls">
        <label class="checkbox-label">
          <input type="checkbox" id="waiting-advanced">
          Advanced variant (deal 5, keep 3)
        </label>
        <button id="waiting-start-btn">Start Game</button>
      </div>
      <div id="waiting-hint"></div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-phase"></span>
      <span id="status-round"></span>
      <span id="status-deck">Deck: –</span>
      <span id="status-sanctuary-deck">Sanctuary: –</span>
    </div>

    <!-- Opponents area -->
    <div id="opponents-area"></div>

    <!-- Market -->
    <div id="market-area">
      <div id="market-label">Draft Market</div>
      <div id="market-cards"></div>
    </div>

    <!-- My area -->
    <div id="my-area">
      <div id="my-tableau-row">
        <div id="my-tableau-label">Your tableau</div>
        <div id="my-tableau"></div>
      </div>
      <div id="my-sanctuaries-row">
        <div id="my-sanctuaries-label">Sanctuaries</div>
        <div id="my-sanctuaries"></div>
      </div>
      <div id="my-hand-row">
        <div id="my-hand-label">Your hand</div>
        <div id="my-hand"></div>
      </div>
    </div>

  </div>

  <!-- Advanced setup modal: pick 3 from 5 -->
  <div id="advanced-modal" class="hidden">
    <div id="advanced-modal-inner">
      <h2>Advanced Setup</h2>
      <p>Choose 3 cards to keep. The other 2 will be shuffled back into the deck.</p>
      <div id="advanced-choices"></div>
      <button id="advanced-confirm-btn" disabled>Keep selected (0 / 3)</button>
    </div>
  </div>


  <!-- Tap-to-zoom backdrop (mobile only, hidden by default) -->
  <div id="card-zoom-backdrop" class="hidden"></div>
  <!-- Card hover zoom popover (shared, repositioned via JS) -->
  <div id="card-zoom"><img src="" alt=""></div>

  <script src="game.js?v=0"></script>
</body>
</html>
