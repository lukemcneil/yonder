<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faraway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Lobby -->
  <div id="lobby">
    <h1>Faraway</h1>
    <div class="lobby-form">
      <label for="player-name">Your name</label>
      <input type="text" id="player-name" placeholder="Alice" maxlength="20">

      <label for="room-name">Room</label>
      <input type="text" id="room-name" placeholder="room1" maxlength="30">

      <label class="checkbox-label">
        <input type="checkbox" id="advanced-variant">
        Advanced variant (deal 5, keep 3)
      </label>

      <button id="connect-btn">Join Game</button>
      <div id="lobby-status"></div>
    </div>
  </div>

  <!-- Game board (hidden until connected) -->
  <div id="game-board" class="hidden">

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-phase"></span>
      <span id="status-round"></span>
      <span id="status-deck">Deck: –</span>
      <span id="status-sanctuary-deck">Sanctuary: –</span>
    </div>

    <!-- Opponents area -->
    <div id="opponents-area"></div>

    <!-- Market -->
    <div id="market-area">
      <div id="market-label">Draft Market</div>
      <div id="market-cards"></div>
    </div>

    <!-- My area -->
    <div id="my-area">
      <div id="my-tableau-row">
        <div id="my-tableau-label">Your tableau</div>
        <div id="my-tableau"></div>
        <div id="my-sanctuaries-label">Sanctuaries</div>
        <div id="my-sanctuaries"></div>
      </div>
      <div id="my-hand-row">
        <div id="my-hand-label">Your hand</div>
        <div id="my-hand"></div>
      </div>
    </div>

  </div>

  <!-- Advanced setup modal: pick 3 from 5 -->
  <div id="advanced-modal" class="hidden">
    <div id="advanced-modal-inner">
      <h2>Advanced Setup</h2>
      <p>Choose 3 cards to keep. The other 2 will be shuffled back into the deck.</p>
      <div id="advanced-choices"></div>
      <button id="advanced-confirm-btn" disabled>Keep selected (0 / 3)</button>
    </div>
  </div>

  <!-- Sanctuary choice modal -->
  <div id="sanctuary-modal" class="hidden">
    <div id="sanctuary-modal-inner">
      <h2>Choose a Sanctuary</h2>
      <p>Keep one card. The rest are discarded.</p>
      <div id="sanctuary-choices"></div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="game-over-overlay" class="hidden">

    <!-- Stage 1: card-by-card scoring reveal -->
    <div id="scoring-reveal" class="hidden">
      <div id="scoring-reveal-inner">
        <div id="scoring-header">
          <span id="scoring-title">Scoring</span>
          <span id="scoring-running-total">0 fame</span>
        </div>
        <div id="scoring-card-area">
          <div id="scoring-card-slot"></div>
          <div id="scoring-card-list"></div>
        </div>
        <div id="scoring-explanation"></div>
        <button id="scoring-next-btn">Reveal first card</button>
      </div>
    </div>

    <!-- Stage 2: final leaderboard -->
    <div id="game-over-inner" class="hidden">
      <h2>Game Over</h2>
      <div id="scores-list"></div>
      <button id="play-again-btn">Play Again</button>
    </div>

  </div>

  <!-- Card hover zoom popover (shared, repositioned via JS) -->
  <div id="card-zoom"><img src="" alt=""></div>

  <script src="game.js"></script>
</body>
</html>
